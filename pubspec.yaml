name: trueats
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.1.0
  http: ^1.2.0
  mobile_scanner: ^7.2.0
  path_provider: ^2.1.5
  qr_flutter: ^4.1.0
  shared_preferences: ^2.2.0
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  geolocator: ^14.0.2
  share_plus: ^12.0.2
  app_links: ^6.3.2
  permission_handler: ^12.0.3
  image_gallery_saver_plus: ^4.0.1
  syncfusion_flutter_pdfviewer: ^33.2.13
  url_launcher: ^6.3.0
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/logo.jpg
    - assets/logo_transparent.png
    - assets/avatar_client_homme.png
    - assets/avatar_client_femme.png
    - assets/avatar_gerant_homme.png
    - assets/avatar_gerant_femme.png
    - assets/avatar_admin_homme.png
    - assets/avatar_admin_femme.png



flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  windows:
    generate: true
    image_path: "assets/logo.jpg"
    icon_size: 48

  image_path: "assets/logo.jpg"
  background_color: "#CA5F31"
  adaptive_icon_background: "#CA5F31"
  adaptive_icon_foreground: "assets/logo_foreground.png"
